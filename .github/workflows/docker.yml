name: docker

on:
  workflow_call:
    inputs:
      image:
        description: "Docker Image to build"
        default: ${{ github.repository }}
        required: false
        type: string
      tag:
        description: "Docker Image tag"
        default: ${{ github.ref_name }}
        required: false
        type: string
      args:
        description: "Docker build args"
        required: false
        type: string
      platforms:
        description: "Platforms to build (comma separated)"
        default: linux/amd64,linux/arm64,linux/arm/v7
        required: false
        type: string
      project:
        description: "Project name"
        default: ${{ github.event.repository.name }}
        required: false
        type: string
      cache:
        description: "Cache location for the Docker image"
        default: ${{ github.repository_owner }}/cache
        required: false
        type: string
      username:
        description: "Docker Hub Username"
        default: ${{ github.repository_owner }}
        required: false
        type: string
    secrets:
      DOCKERHUB_TOKEN:
        description: "Docker Hub Token"
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # - uses: docker/setup-qemu-action@v3
      #   with:
      #     platforms: ${{ inputs.platforms }}

      # - uses: docker/setup-buildx-action@v3

      # - uses: docker/login-action@v3
      #   with:
      #     username: ${{ inputs.username }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ inputs.image }}
          flavor: |
            latest=false
          tags: |
            # Tag releases like "v1.2.3" as "1.2.3" and "1.2"
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

            # Tag all branches with their name
            type=ref,event=branch

            # Tag the default branch as "latest"
            type=raw,value=latest,enable={{is_default_branch}}

      - name: info
        run: |
          echo "Building Docker image"
          echo "Generated tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Generated labels:"
          echo "${{ steps.meta.outputs.labels }}"
          echo "Building Docker image '${{ steps.meta.outputs.tags }}'"
          echo "Using args: ${{ inputs.args }}"

      # - uses: docker/build-push-action@v6
