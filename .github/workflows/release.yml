name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - dev
      - main

jobs:
  # info:
  #   uses: idelchi/devenv/.github/workflows/info.yml@dev

  release:
    uses: idelchi/devenv/.github/workflows/gorelease.yml@dev
    if: ${{ endsWith(github.ref, '-shawtay') }}
    # needs: info
    permissions:
      contents: write
    with:
      config: .devenv/.goreleaser.yaml

  docker:
    # uses: idelchi/devenv/.github/workflows/docker.yml@dev
    uses: ./.github/workflows/docker.yml
    # if: ${{ ! endsWith(github.ref, '-beta') }}
    if: ${{ !failure() && !cancelled() }}
    needs: release
    permissions:
      contents: write
    secrets: inherit
    with:
      platforms: linux/amd64,linux/arm64
      # args: |
      #   GODYL_VERSION=${{ github.ref_name }}
      args: |
        GODYL_VERSION=${{
          startsWith(github.ref, 'refs/tags/') && github.ref_name ||
        github.head_ref:github.sha
        }}
