output: ~/.local/bin
exe:
  patterns:
    - "^{{ .Exe.Name }}{{ .Platform.Extension }}$"
    - ".*/{{ .Exe.Name }}{{ .Platform.Extension }}$"
hints:
  - pattern: "{{ .Exe.Name }}"
    weight: 1
  - pattern: zip
    weight: '{{ if eq .Platform.OS "windows" }}1{{ else }}0{{ end }}'
extensions:
  - '{{ if eq .Platform.OS "windows" }}.exe{{ else }}{{ end }}'
  - '{{ if eq .Platform.OS "windows" }}.zip{{ else }}{{ end }}'
  - .tar.gz
mode: find
source:
  type: github
strategy: none
env:
  GH_TOKEN: $GODYL_GITHUB_TOKEN
