# output: ~/.local/bin
output: .bin-{{ .OS }}-{{ .ARCH_LONG }}
exe:
  patterns:
    - "^{{ .Exe }}{{ .EXTENSION }}$"
    - ".*/{{ .Exe }}{{ .EXTENSION }}$"
hints:
  - pattern: "{{ .Exe }}"
    weight: 1
  - pattern: "armv{{ .ARCH_VERSION }}"
    weight: 4
  - pattern: "armv{{sub .ARCH_VERSION 1}}"
    weight: 3
  - pattern: "armv{{sub .ARCH_VERSION 2}}"
    weight: 2
  - pattern: "arm[^v].*"
    weight: 1
  - pattern: "musleabihf"
    weight: |-
      {{- if and (eq .DISTRIBUTION "alpine") (eq .ARCH "arm") -}}
      1
      {{- else -}}
      0
      {{- end -}}
extensions:
  - '{{ if eq .OS "windows" }}.exe{{ else }}{{ end }}'
  - '{{ if eq .OS "windows" }}.zip{{ else }}{{ end }}'
  - '{{ if eq .OS "darwin" }}.zip{{ else }}{{ end }}'
  - .tar.gz
mode: find
source:
  type: github
  github:
    token: from_default
  url:
    token:
      scheme: Basic
strategy: none
env:
  GH_TOKEN: $GODYL_GITHUB_TOKEN
version:
  commands:
    - --version
    - -v
    - -version
    - version
  patterns:
    - '.*?(\d+\.\d+\.\d+).*'
    - '.*?(\d+\.\d+).*'
  # TODO(Idelchi): This handling is confusing:
  #   1) If a flag is defined, then we have to use defaults.go to merge/set properly
  #       This means some stuff like "--tags/tags:" will not be settable here
  #   2) If a flag is not defined, it will be possible to set them here
  # On the other hand, remember that tags: on a tool (which defaults.yml) is for, is not the same as
  # `tags` that is passed from the commandline
