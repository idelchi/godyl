- name: nivekuil/rip
  skip:
    - reason: "rip is only available for linux arm32 and amd64"
      condition:
        - |
          {{- or
              (ne .Platform.OS "linux")
              (and
                (ne .Platform.Architecture.Type "arm32")
                (ne .Platform.Architecture.Type "amd64")
              )
          -}}
  version: 0.11.4
