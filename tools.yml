- name: cli/cli
  output: bin/{{ .OS }}-{{ .ARCH }}
  exe:
    name: gh
    patterns:
      - bin/gh{{ .Extension }}$
  post:
    - "{{ .Output }}/{{ .Exe.Name }} extension install github/gh-copilot"
    - "{{ .Output }}/{{ .Exe.Name }} extension upgrade gh-copilot"
    - echo 'eval "$(gh copilot alias -- bash)"' >> ~/.bashrc
