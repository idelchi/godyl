- name: moncho/dry
  description: A Docker manager for the terminal
  exe:
    name: dry
    patterns: ^dry
  extensions: ""
  tags:
    - docker

- name: jesseduffield/lazydocker
  description: The lazier way to manage everything docker
  aliases: lazy
  tags:
    - docker

- name: bcicen/ctop
  description: Top-like interface for container metrics
  skip:
    reason: "ctop is not available for darwin arm64"
    condition: '{{ and (eq .OS "darwin") (eq .ARCH "arm64") }}'
  extensions: []
  tags:
    - docker

- name: ynqa/jnv
  description: JSON navigator
  skip:
    - reason: "jnv not available for arm64"
      condition: '{{ eq .ARCH "arm64" }}'
    - reason: "jnv not available for arm"
      condition: '{{ eq .ARCH "arm" }}'
  extensions: |
    {{- if eq .OS "windows" -}}
        .zips
    {{- else -}}
        .xzss
    {{- end -}}
  tags:
    - processing
