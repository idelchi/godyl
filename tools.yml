  source:
    type: url
  tags:
    - docker

- name: kubectl
  version: 1.31.0
  path: https://dl.k8s.io/v{{ .Version }}/bin/{{ .Platform.OS }}/{{ .Platform.Architecture.Type }}/kubectl{{ .Platform.Extension }}
  aliases: kc
  source:
    type: url
  tags:
    - docker

- name: terraform
  version: 1.9.5
  path: https://releases.hashicorp.com/terraform/{{ .Version }}/terraform_{{ .Version }}_{{ .Platform.OS }}_{{ .Platform.Architecture.Type }}.zip
  aliases: tf
  source:
    type: url

- name: nvbn/thefuck
  exe: thefuck
  version: 3.32
  source:
    type: command
    commands:
      - |
        {{ if eq .Platform.OS "linux" }}
        pip install {{ .Exe }}=={{ .Version }} --user --break-system-packages
        {{ else }}
        echo "installation skipped"
        {{ end }}
  tags:
    - python
    - linux
    - native

- name: facebook/PathPicker
  version: 3.32
  source:
    type: command
    commands:
      - |
        {{ if eq .Platform.OS "linux" }}
        cd {{ .Output }}
        rm -rf PathPicker
        git clone https://github.com/facebook/PathPicker.git
        cd PathPicker/
        ln -sf "$(pwd)/fpp" {{ .Output }}/fpp
        {{ else }}
        echo "installation skipped"
        {{ end }}
  tags:
    - linux
    - native

- name: sebglazebrook/aliases
  version: 0.8.1
  source:
    type: command
    commands:
      - |
        TMP_DIR=$(mktemp -d)
        echo curl -L -o ${TMP_DIR}/aliases_{{ .Version }}.deb https://github.com/sebglazebrook/aliases/raw/refs/heads/master/releases/{{ .Version }}/debian/aliases_{{ .Version }}.deb
        curl -L -o ${TMP_DIR}/aliases_{{ .Version }}.deb https://github.com/sebglazebrook/aliases/raw/refs/heads/master/releases/{{ .Version }}/debian/aliases_{{ .Version }}.deb
        apt-get install -y ${TMP_DIR}/aliases_{{ .Version }}.deb
        rm -rf ${TMP_DIR}
        aliases init --global >> ~/.bashrc
  tags:
    - elevated
    - linux
    - native

- name: shannonmoeller/up
  source:
    type: command
    commands:
      - |
        curl --create-dirs -o ~/.config/up/up.sh https://raw.githubusercontent.com/shannonmoeller/up/master/up.sh
        echo 'source ~/.config/up/up.sh' >> ~/.bashrc
      - |
        fish -c '
        curl --create-dirs -o ~/.config/up/up.fish https://raw.githubusercontent.com/shannonmoeller/up/master/up.fish
        source ~/.config/up/up.fish
        '
  tags:
    - linux
    - native

