- name: dominikwilkowski/cfonts
  exe: cfonts
  source:
    type: command
    commands:
      - |
        TMPDIR=$(mktemp -d)
        export RUSTUP_HOME=${TMPDIR}/home
        export CARGO_HOME=${TMPDIR}/cargo
        curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf | sh -s -- -y
        dir=$(dirname {{ .Output }})
        ${TMPDIR}/cargo/bin/cargo install {{ .Exe.Name }} --root ${dir}
        rm -rf ${TMPDIR}
  tags:
    - rust
    - native

- name: yank
  description: mptre/yank
  version: 1.3.0-1
  exe: yank-cli
  source:
    type: command
    commands:
      - |
        {{ if eq .Platform.OS "linux" }}
        apt-get update
        apt-get install -y {{ .Name }}={{ .Version }}
        {{ else }}
        echo "installation skipped"
        {{ end }}
  tags:
    - elevated
    - linux
    - native
