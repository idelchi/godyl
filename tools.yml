- name: Canop/dysk
  description: A linux utility to get information on filesystems, like df but better
  url: https://dystroy.org/dysk/download/{{ index .ARCH_ALIASES 0 }}-unknown-{{ .OS }}-gnu/dysk
  checksum: none
  exe: dysk
  skip:
    reason: "dysk is only available for linux"
    condition: '{{ ne .OS "linux" }}'
  tags:
    - terminal

- name: gitlab-org/release-cli
  description: A command-line tool for managing GitLab releases
  checksum: none
  inherit: gitlab
  tags:
    - terminal

- name: gitlab-org/cli
  description: glab is an open source GitLab CLI tool
  exe: glab
  hints:
    - pattern: .zip
      match: '{{ if eq .OS "windows" }}required{{ end }}'
      type: endswith
    - pattern: .tar.gz
      match: '{{ if ne .OS "windows" }}required{{ end }}'
      type: endswith
  inherit: gitlab
  tags:
    - terminal

